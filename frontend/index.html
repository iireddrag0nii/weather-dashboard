<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
<style>
/* ===================== */
/* CSS VARIABLES         */
/* ===================== */
:root {
  --bg:          #05080f;
  --glass:       rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --glass-border:rgba(255,255,255,0.12);
  --text:        #f0f4ff;
  --text-muted:  #6b7fa3;
  --text-dim:    #3a4a6a;
  --accent:      #4f8ef7;
  --accent2:     #7c6af7;
  --card-shadow: 0 8px 40px rgba(0,0,0,0.5);
  --radius:      18px;
  --radius-sm:   10px;
  --font-head:   'Syne', sans-serif;
  --font-data:   'JetBrains Mono', monospace;
}
[data-theme="light"] {
  --bg:          #dde8f5;
  --glass:       rgba(255,255,255,0.55);
  --glass-hover: rgba(255,255,255,0.75);
  --glass-border:rgba(255,255,255,0.8);
  --text:        #0f1929;
  --text-muted:  #4a5a7a;
  --text-dim:    #9aabca;
  --card-shadow: 0 8px 40px rgba(0,60,120,0.12);
}

/* ===================== */
/* RESET + BASE          */
/* ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-head);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 1.5s ease;
}

/* ===================== */
/* ANIMATED BACKGROUND   */
/* ===================== */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.7;
}
#bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; transition: background 3s ease;
}

/* ===================== */
/* LAYOUT                */
/* ===================== */
.app {
  position: relative; z-index: 1;
  max-width: 1300px; margin: 0 auto;
  padding: 12px 12px 60px;
}

/* ===================== */
/* GLASS CARD            */
/* ===================== */
.glass {
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
}
.glass:hover { background: var(--glass-hover); }

/* ===================== */
/* HEADER — fix truncation */
/* ===================== */
header {
  display: flex;
  align-items: flex-start; /* FIX: align top so wrapped title doesn't mis-align buttons */
  justify-content: space-between;
  gap: 8px;
  padding: 10px 0 6px;
  flex-wrap: nowrap;
}
.header-left { flex: 1; min-width: 0; }
.header-left h1 {
  font-size: clamp(1.2rem, 5vw, 2.4rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  /* FIX: allow wrapping instead of truncating with ellipsis */
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
}
.header-left h1 span { color: var(--accent); }
#location-display {
  font-size: clamp(0.7rem, 2.5vw, 1rem);
  color: var(--text-muted);
  font-family: var(--font-data);
  font-weight: 300;
  margin-top: 2px;
  min-height: 1.2em;
  /* FIX: allow location to wrap too */
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
}
.header-right {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
  padding-top: 2px; /* nudge buttons to align with first line of title */
}
.icon-btn {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text);
  border-radius: 50%;
  width: 36px; height: 36px;  /* FIX: slightly smaller on mobile */
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--glass-hover); transform: scale(1.08); }

/* ===================== */
/* ALERTS                */
/* ===================== */
#alerts-container { margin: 8px 0; display: flex; flex-direction: column; gap: 8px; }
.alert-banner {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
  font-size: 13px; animation: slideIn 0.3s ease; border-left: 4px solid;
}
.alert-banner.Extreme  { background: rgba(220,38,38,0.2);  border-color: #dc2626; }
.alert-banner.Severe   { background: rgba(234,88,12,0.2);  border-color: #ea580c; }
.alert-banner.Moderate { background: rgba(202,138,4,0.2);  border-color: #ca8a04; }
.alert-banner.Minor    { background: rgba(79,142,247,0.2); border-color: var(--accent); }
.alert-event  { font-weight: 700; display: block; margin-bottom: 2px; }
.alert-close  { cursor: pointer; opacity: 0.6; font-size: 18px; line-height: 1; flex-shrink: 0; background: none; border: none; color: inherit; }
.alert-close:hover { opacity: 1; }

/* ===================== */
/* CONTROLS ROW          */
/* ===================== */
.controls-row {
  display: flex; flex-wrap: wrap;
  gap: 8px; margin: 10px 0; align-items: center;
}
.search-group {
  display: flex; gap: 6px;
  flex: 1; min-width: 0;
}
#city-input {
  flex: 1; min-width: 0;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--glass); color: var(--text);
  font-family: var(--font-head); font-size: 14px;
  backdrop-filter: blur(12px); outline: none;
  transition: border-color 0.2s;
}
#city-input:focus { border-color: var(--accent); }
#city-input::placeholder { color: var(--text-muted); }
.btn {
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--glass); color: var(--text);
  font-family: var(--font-head); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  backdrop-filter: blur(12px);
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.btn:hover { background: var(--glass-hover); transform: translateY(-1px); }
.btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.unit-group { display: flex; gap: 6px; flex-shrink: 0; }

/* ===================== */
/* FAVORITES STRIP       */
/* ===================== */
#favorites-strip {
  display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 10px;
}
.fav-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 30px;
  border: 1px solid var(--glass-border);
  background: var(--glass); color: var(--text);
  font-family: var(--font-head); font-size: 12px;
  cursor: pointer; backdrop-filter: blur(12px);
  transition: background 0.2s;
}
.fav-pill:hover { background: var(--glass-hover); }
.fav-remove { opacity: 0.5; font-size: 15px; cursor: pointer; }
.fav-remove:hover { opacity: 1; }

/* ===================== */
/* CURRENT CONDITIONS    */
/* ===================== */
.current-card {
  padding: 20px;
  margin-bottom: 14px;
}
.current-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.current-temp-icon {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.current-temp {
  font-size: clamp(2.8rem, 10vw, 5rem);
  font-weight: 800;
  line-height: 1;
  font-family: var(--font-data);
  letter-spacing: -0.03em;
}
.current-wx-icon {
  font-size: clamp(2rem, 7vw, 4rem);
  line-height: 1;
  margin-top: 4px;
}
.current-meta {}
.current-condition {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.sun-row {
  display: flex;
  gap: 14px;
  font-family: var(--font-data);
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.sun-row span { color: var(--text); font-weight: 500; }

/* Stats grid — FIX: 2 cols on mobile, more on desktop */
.current-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media (min-width: 480px) {
  .current-stats { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 900px) {
  .current-stats { grid-template-columns: repeat(4, 1fr); }
}
.stat-cell {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 10px 12px;
}
.stat-label {
  display: block; font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-dim); font-weight: 600; margin-bottom: 4px;
}
.stat-value {
  display: block; font-family: var(--font-data);
  font-size: 14px; font-weight: 500; color: var(--text);
}

/* ===================== */
/* SECTION TITLE         */
/* ===================== */
.section-title {
  font-size: 0.65rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--text-dim);
  font-weight: 700; margin-bottom: 8px;
}

/* ===================== */
/* HOURLY FORECAST       */
/* ===================== */
.hourly-scroll {
  display: flex; gap: 6px;
  overflow-x: auto; padding-bottom: 8px;
  scroll-snap-type: x mandatory;
  -ms-overflow-style: none; scrollbar-width: none;
  margin-bottom: 14px;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.hour-card {
  flex-shrink: 0;
  width: clamp(62px, 16vw, 76px); /* FIX: fluid width so mobile shows ~4-5 cards */
  scroll-snap-align: start;
  padding: 10px 6px;
  border-radius: 14px; text-align: center;
  border: 1px solid var(--glass-border);
  background: var(--glass); backdrop-filter: blur(16px);
  transition: background 0.2s;
}
.hour-card:hover { background: var(--glass-hover); }
.hour-card.now { border-color: var(--accent); background: rgba(79,142,247,0.12); }
.hour-time {
  font-size: 9px; color: var(--text-muted);
  font-family: var(--font-data); margin-bottom: 5px; font-weight: 500;
}
.hour-icon  { font-size: 18px; line-height: 1; margin-bottom: 5px; }
.hour-temp  { font-family: var(--font-data); font-size: 12px; font-weight: 500; margin-bottom: 3px; }
.hour-precip{ font-size: 9px; color: #60a5fa; font-family: var(--font-data); }

/* ===================== */
/* 7-DAY FORECAST — fix orphaned last card */
/* ===================== */
#forecast-grid {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
  /* FIX: use auto-fill so 7 cards never leave an orphan at half width.
     minmax(140px,1fr) fills the row evenly regardless of count */
  grid-template-columns: repeat(2, 1fr);
}
@media (min-width: 480px) {
  /* 3 cols: 6 cards fill 2 rows, 7th starts row 3 — still orphaned.
     Use 480-699 as the one range where we force all 7 into consideration */
  #forecast-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 560px) and (max-width: 699px) {
  /* FIX: at this width we can fit 4 cols — 7 cards = 4+3, much better */
  #forecast-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 700px) {
  #forecast-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 900px) {
  /* FIX: force all 7 into one row on desktop */
  #forecast-grid { grid-template-columns: repeat(7, 1fr); }
}
.day-card {
  padding: 12px 8px; border-radius: var(--radius);
  border: 1px solid var(--glass-border);
  background: var(--glass); backdrop-filter: blur(16px);
  text-align: center; transition: background 0.2s, transform 0.15s;
}
.day-card:hover { background: var(--glass-hover); transform: translateY(-2px); }
.day-name {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin-bottom: 6px;
}
.day-icon    { font-size: 1.8rem; line-height: 1; margin-bottom: 3px; }
.day-condition { font-size: 9px; color: var(--text-muted); margin-bottom: 6px; min-height: 12px; }
.day-temps   { font-family: var(--font-data); font-size: 12px; margin-bottom: 4px; }
.day-high    { color: var(--text); font-weight: 500; }
.day-low     { color: var(--text-muted); }
.day-precip  { font-size: 10px; color: #60a5fa; font-family: var(--font-data); margin-bottom: 4px; }
.day-sun     { font-size: 9px; color: rgba(255,255,255,0.7); font-family: var(--font-data); line-height: 1.7; }

/* ===================== */
/* MAP SECTION           */
/* ===================== */
.map-section { margin-bottom: 20px; }
.map-controls {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 8px; align-items: center;
}
.map-controls .section-title { margin-bottom: 0; flex-shrink: 0; margin-right: 4px; }
#map {
  height: clamp(260px, 50vw, 480px);
  width: 100%; border-radius: var(--radius);
  border: 1px solid var(--glass-border);
}
#radar-status {
  margin-top: 6px;
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--text-muted);
  min-height: 18px;
  /* FIX: hide the "future frames load when available" line on small screens
     by truncating — the progress bar already communicates frame count */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
@media (min-width: 600px) {
  /* Allow full text on wider screens where it fits on one line */
  #radar-status {
    white-space: normal;
    overflow: visible;
    text-overflow: unset;
  }
}

/* ===================== */
/* TOAST                 */
/* ===================== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #fff;
  padding: 10px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  z-index: 1000; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== */
/* GPS WARNING           */
/* ===================== */
#gps-warning {
  background: rgba(202,138,4,0.15);
  border: 1px solid #ca8a04; color: #fbbf24;
  border-radius: var(--radius-sm);
  padding: 8px 14px; font-size: 12px;
  margin-bottom: 10px; display: none;
}

/* ===================== */
/* ANIMATIONS            */
/* ===================== */
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.current-card  { animation: fadeUp 0.4s 0.1s ease both; }
.hourly-scroll { animation: fadeUp 0.4s 0.2s ease both; }
#forecast-grid { animation: fadeUp 0.4s 0.3s ease both; }
.map-section   { animation: fadeUp 0.4s 0.4s ease both; }

/* ===================== */
/* SCROLLBAR             */
/* ===================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="bg-gradient"></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>🌦 Weather <span>Dashboard</span></h1>
      <div id="location-display">Locating...</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="theme-btn"    onclick="toggleTheme()"   title="Toggle theme">🌙</button>
      <button class="icon-btn" id="share-btn"    onclick="shareWeather()"  title="Share location">🔗</button>
      <button class="icon-btn" id="save-btn"     onclick="addFavorite()"   title="Save location">⭐</button>
    </div>
  </header>

  <!-- GPS WARNING -->
  <div id="gps-warning">📍 Auto-location blocked over HTTP — search a city or use the GPS button.</div>

  <!-- ALERTS -->
  <div id="alerts-container"></div>

  <!-- CONTROLS -->
  <div class="controls-row">
    <div class="search-group">
      <input id="city-input" type="text" placeholder="Search city, e.g. Memphis, TN" />
      <button class="btn" onclick="searchCity()">🔍</button>
      <button class="btn" onclick="tryGPS()">📍</button>
    </div>
    <div class="unit-group">
      <button class="btn active" id="temp-btn"  onclick="toggleTemp()">°C</button>
      <button class="btn"        id="wind-btn"  onclick="cycleWind()">m/s</button>
    </div>
  </div>

  <!-- FAVORITES -->
  <div id="favorites-strip"></div>

  <!-- CURRENT CONDITIONS -->
  <div class="current-card glass">
  <div class="current-top">
    <div class="current-temp-icon">
      <div class="current-temp" id="cur-temp">--</div>
      <div class="current-wx-icon" id="cur-icon">🌡️</div>
    </div>
    <div class="current-meta">
      <div class="current-condition" id="cur-condition">Loading...</div>
      <div class="sun-row" id="cur-sun"></div>
    </div>
  </div>
  <div class="current-stats" id="cur-stats">
    <div class="stat-cell"><span class="stat-label">Feels Like</span><span class="stat-value" id="s-feels">--</span></div>
    <div class="stat-cell"><span class="stat-label">Humidity</span><span class="stat-value" id="s-humid">--</span></div>
    <div class="stat-cell"><span class="stat-label">Wind</span><span class="stat-value" id="s-wind">--</span></div>
    <div class="stat-cell"><span class="stat-label">UV Index</span><span class="stat-value" id="s-uv">--</span></div>
    <div class="stat-cell"><span class="stat-label">Pressure</span><span class="stat-value" id="s-pressure">--</span></div>
    <div class="stat-cell"><span class="stat-label">Visibility</span><span class="stat-value" id="s-vis">--</span></div>
    <div class="stat-cell"><span class="stat-label">Dew Point</span><span class="stat-value" id="s-dew">--</span></div>
  </div>
</div>

  <!-- HOURLY -->
  <div class="section-title">24-Hour Forecast</div>
  <div class="hourly-scroll" id="hourly-scroll"></div>

  <!-- 7-DAY -->
  <div class="section-title">7-Day Forecast</div>
  <div id="forecast-grid"></div>

  <!-- MAP -->
  <div class="map-section">
    <div class="map-controls">
      <span class="section-title">Radar Map</span>
      <button class="btn active" id="style-dark"      onclick="setMapStyle('dark')">🌙 Dark</button>
      <button class="btn"        id="style-satellite" onclick="setMapStyle('satellite')">🛰 Satellite</button>
      <button class="btn active" id="radar-toggle-btn" onclick="toggleRadarOverlay()">📡 Radar ●</button>
    </div>
    <div id="map"></div>
    <div id="radar-status"></div>
  </div>

</div><!-- /app -->

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script>
// =====================
// STATE
// =====================
let lat = 33.829, lon = -90.0012;
let map = null, mapReady = false;
let mapStyle = 'dark', radarEnabled = true;
let useFahrenheit = false, windUnit = 'ms'; // 'ms','mph','kmh'
let weatherData = null, forecastData = null, hourlyData = null;
let radarFrames = [], currentRadarFrame = 0, radarAnimInterval = null;
let weatherCanvas, bgCtx;

// =====================
// ICONS + LABELS
// =====================
const ICONS = {
  1000:"☀️",1100:"🌤️",1101:"⛅",1102:"🌥️",1001:"☁️",
  2000:"🌫️",2100:"🌫️",4000:"🌦️",4001:"🌧️",4200:"🌦️",
  4201:"🌧️",5000:"❄️",5001:"🌨️",5100:"🌨️",5101:"❄️",
  6000:"🌧️",6001:"🌧️",6200:"🌧️",6201:"🌧️",
  7000:"🧊",7101:"🧊",7102:"🧊",8000:"⛈️"
};
const LABELS = {
  1000:"Clear",1100:"Mostly Clear",1101:"Partly Cloudy",1102:"Mostly Cloudy",
  1001:"Cloudy",2000:"Fog",2100:"Light Fog",4000:"Drizzle",4001:"Rain",
  4200:"Light Rain",4201:"Heavy Rain",5000:"Snow",5001:"Flurries",
  5100:"Light Snow",5101:"Heavy Snow",6000:"Freezing Drizzle",
  6001:"Freezing Rain",6200:"Light Freezing Rain",6201:"Heavy Freezing Rain",
  7000:"Ice Pellets",7101:"Heavy Ice Pellets",7102:"Light Ice Pellets",8000:"Thunderstorm"
};
const icon  = c => ICONS[c]  || "🌡️";
const label = c => LABELS[c] || "";

// =====================
// UNIT HELPERS
// =====================
function tempC(c) {
  if (c == null || isNaN(c)) return "--";
  const v = useFahrenheit ? c * 9/5 + 32 : c;
  return (Math.round(v * 10) / 10) + (useFahrenheit ? "°F" : "°C");
}
function tempVal(c) {
  if (c == null || isNaN(c)) return "--";
  const v = useFahrenheit ? c * 9/5 + 32 : c;
  return Math.round(v * 10) / 10;
}
function windStr(ms) {
  if (ms == null) return "--";
  if (windUnit === 'mph') return (Math.round(ms * 2.237 * 10)/10) + " mph";
  if (windUnit === 'kmh') return (Math.round(ms * 3.6  * 10)/10) + " km/h";
  return (Math.round(ms * 10)/10) + " m/s";
}
function visStr(m) {
  if (m == null) return "--";
  if (useFahrenheit) return (Math.round(m / 1609.34 * 10)/10) + " mi";
  return (Math.round(m / 1000 * 10)/10) + " km";
}
function degreesToCardinal(deg) {
  if (deg == null) return "--";
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}
function uvInfo(uv) {
  if (uv == null) return { text:'--', color:'var(--text-muted)' };
  if (uv <= 2)  return { text:`${Math.round(uv*10)/10} Low`,       color:'#4ade80' };
  if (uv <= 5)  return { text:`${Math.round(uv*10)/10} Moderate`,  color:'#facc15' };
  if (uv <= 7)  return { text:`${Math.round(uv*10)/10} High`,      color:'#fb923c' };
  if (uv <= 10) return { text:`${Math.round(uv*10)/10} Very High`, color:'#f87171' };
  return { text:`${Math.round(uv*10)/10} Extreme`, color:'#c084fc' };
}
// Replace the existing fmtTime function with this timezone-aware version
function fmtTime(iso, tz) {
  if (!iso) return "--";
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true,
    timeZone: tz || undefined  // use location timezone if available
  });
}

class WeatherBg {
  constructor() {
    this.canvas = document.getElementById('bg-canvas');
    this.ctx    = this.canvas.getContext('2d');
    this.particles = [];
    this.type   = 'clear';
    this.raf    = null;
    this.lightningTimer = 120;
    this.resize();
    window.addEventListener('resize', () => this.resize());
  }
  resize() {
    this.canvas.width  = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.initParticles();
  }
  setWeather(code, isDay) {
    // Set body gradient
    const grad = document.getElementById('bg-gradient');
    if      ([8000].includes(code))                                       { grad.style.background = 'linear-gradient(160deg,#050210 0%,#150525 60%,#0d0318 100%)'; this.type='storm'; }
    else if ([5000,5001,5100,5101].includes(code))                        { grad.style.background = 'linear-gradient(160deg,#0c1828 0%,#162a45 60%,#0c2035 100%)'; this.type='snow'; }
    else if ([4000,4001,4200,4201,6000,6001,6200,6201].includes(code))   { grad.style.background = 'linear-gradient(160deg,#060e1c 0%,#0c1e38 60%,#081528 100%)'; this.type='rain'; }
    else if ([2000,2100].includes(code))                                  { grad.style.background = 'linear-gradient(160deg,#0e1520 0%,#1a2535 60%,#101820 100%)'; this.type='none'; }
    else if ([1001,1102].includes(code))                                  { grad.style.background = 'linear-gradient(160deg,#0d1220 0%,#161e35 60%,#0d1425 100%)'; this.type='none'; }
    else if (isDay)                                                       { grad.style.background = 'linear-gradient(160deg,#0a1e3d 0%,#0f3068 60%,#0a2248 100%)'; this.type='none'; }
    else                                                                  { grad.style.background = 'linear-gradient(160deg,#020408 0%,#04091a 60%,#020510 100%)'; this.type='stars'; }
    this.initParticles();
    if (!this.raf) this.draw();
  }
  initParticles() {
    this.particles = [];
    const w = this.canvas.width, h = this.canvas.height;
    if (this.type === 'rain' || this.type === 'storm') {
      for (let i=0;i<160;i++) this.particles.push({ x:Math.random()*w, y:Math.random()*h, sp:9+Math.random()*5, len:14+Math.random()*18, op:0.2+Math.random()*0.4 });
    } else if (this.type === 'snow') {
      for (let i=0;i<90;i++) this.particles.push({ x:Math.random()*w, y:Math.random()*h, r:1+Math.random()*2.5, sp:0.4+Math.random()*1.2, dr:(Math.random()-0.5)*0.4, op:0.5+Math.random()*0.5 });
    } else if (this.type === 'stars') {
      for (let i=0;i<250;i++) this.particles.push({ x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.2, op:0.2+Math.random()*0.8, ts:0.008+Math.random()*0.015, td:Math.random()>0.5?1:-1 });
    }
  }
  draw() {
    const ctx = this.ctx, w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0,0,w,h);
    if (this.type==='rain'||this.type==='storm') {
      ctx.strokeStyle='rgba(174,214,241,0.5)'; ctx.lineWidth=1;
      for (const p of this.particles) {
        ctx.globalAlpha=p.op; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.len*0.18,p.y+p.len); ctx.stroke();
        p.y+=p.sp; if (p.y>h) { p.y=-p.len; p.x=Math.random()*w; }
      }
      if (this.type==='storm') {
        this.lightningTimer--;
        if (this.lightningTimer<=0) { ctx.globalAlpha=Math.random()*0.12; ctx.fillStyle='rgba(255,255,220,1)'; ctx.fillRect(0,0,w,h); this.lightningTimer=80+Math.floor(Math.random()*200); }
      }
    }
    if (this.type==='snow') {
      ctx.fillStyle='white';
      for (const p of this.particles) {
        ctx.globalAlpha=p.op; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        p.y+=p.sp; p.x+=p.dr;
        if (p.y>h) { p.y=-p.r; p.x=Math.random()*w; }
        if (p.x<0) p.x=w; if (p.x>w) p.x=0;
      }
    }
    if (this.type==='stars') {
      ctx.fillStyle='white';
      for (const p of this.particles) {
        p.op+=p.ts*p.td; if (p.op>1){p.op=1;p.td=-1;} if (p.op<0.1){p.op=0.1;p.td=1;}
        ctx.globalAlpha=p.op; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    this.raf = requestAnimationFrame(() => this.draw());
  }
}

function renderHourly() {
  const scroll = document.getElementById('hourly-scroll');
  scroll.innerHTML = '';
  (hourlyData || []).forEach((h, i) => {
    const card = document.createElement('div');
    card.className = 'hour-card' + (i === 0 ? ' now' : '');

    let timeLabel;
    if (i === 0) {
      timeLabel = 'Now';
    } else {
      // FIX: Open-Meteo times are ALREADY in the location's local timezone
      // e.g. "2025-04-25T17:00" means 5:00 PM local — no conversion needed.
      // Previously we appended 'Z' making JS treat it as UTC, then shifted it
      // again with timeZone: which double-converted and showed the wrong time.
      // Just read the hour/minute straight from the string.
      const timePart = h.time.split('T')[1]; // "17:00"
      const [hourStr, minStr] = timePart.split(':');
      const hour = parseInt(hourStr);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const display = hour % 12 || 12;
      timeLabel = `${display}:${minStr} ${ampm}`;
    }

    card.innerHTML = `
      <div class="hour-time">${timeLabel}</div>
      <div class="hour-icon">${icon(h.weatherCode)}</div>
      <div class="hour-temp">${tempVal(h.temperature)}°</div>
      <div class="hour-precip">${h.precipProb ?? 0}% 💧</div>`;
    scroll.appendChild(card);
  });
}

      if (resourceType === 'Tile' && url.includes('tilecache.rainviewer.com')) {
        // URL structure: /v2/radar/{timestamp}/256/{z}/{x}/{y}/2/1_1.png

            const fixed = url.replace(

              `/256/12/${x}/${y}/2/`

async function fetchRadarFrames(retries=3) {
  for (let attempt=1; attempt<=retries; attempt++) {
    try {
      const res = await fetch(`https://api.rainviewer.com/public/weather-maps.json?_=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const past    = (data?.radar?.past    || []).map(f=>({...f,type:'past'}));
      const nowcast = (data?.radar?.nowcast || []).map(f=>({...f,type:'future'}));
      console.log(`Radar attempt ${attempt}: ${past.length} past, ${nowcast.length} nowcast`);
      if (past.length) return { frames:[...past,...nowcast], pastCount:past.length, futureCount:nowcast.length };
    } catch(e) { console.warn(`Radar attempt ${attempt}:`, e.message); }
    if (attempt < retries) await new Promise(r=>setTimeout(r,2000));
  }
  return null;
}
function addRadarLayersToMap(frames) {
  frames.forEach((_, i) => {
    try { if (map.getLayer(`radar-layer-${i}`)) map.removeLayer(`radar-layer-${i}`); } catch(e) {}
    try { if (map.getSource(`radar-${i}`))      map.removeSource(`radar-${i}`);      } catch(e) {}
  });

  frames.forEach((frame, i) => {
    map.addSource(`radar-${i}`, {
      type: 'raster',
      // transformRequest handles z > 12, but maxzoom here stops Mapbox
      // from even attempting tile requests above zoom 12 in the first place
      tiles: [`https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`],
      tileSize: 256,
      minzoom: 2,   // matches map minZoom — no tiles exist below this
      maxzoom: 12   // Mapbox reuses zoom-12 tiles above this level
    });
    map.addLayer({
      id: `radar-layer-${i}`,
      type: 'raster',
      source: `radar-${i}`,
      paint: {
        'raster-opacity': 0,
        'raster-fade-duration': 0,
        'raster-resampling': 'linear'  // upscales zoom-12 tiles smoothly when zoomed past 12
      }
    });
  });
}
function ensureRadarLayers() {
  if (radarFrames.length && !map.getLayer('radar-layer-0')) {
    addRadarLayersToMap(radarFrames); showRadarFrame(currentRadarFrame);
  }
}
function startRadarAnimation() {
  if (radarAnimInterval) clearInterval(radarAnimInterval);
  radarAnimInterval = setInterval(() => {
    ensureRadarLayers();
    map.setPaintProperty(`radar-layer-${currentRadarFrame}`, 'raster-opacity', 0);
    currentRadarFrame = (currentRadarFrame + 1) % radarFrames.length;
    showRadarFrame(currentRadarFrame);
  }, 700);
}
async function loadRadar() {
  if (!mapReady || !radarEnabled) return;

  if (radarAnimInterval) { clearInterval(radarAnimInterval); radarAnimInterval = null; }
  radarFrames.forEach((_,i) => {
    try { if (map.getLayer(`radar-layer-${i}`)) map.removeLayer(`radar-layer-${i}`); } catch(e){}
    try { if (map.getSource(`radar-${i}`))      map.removeSource(`radar-${i}`);      } catch(e){}
  });
  radarFrames = [];
  document.getElementById('radar-status').textContent = '📡 Loading radar...';

  const result = await fetchRadarFrames(3);
  if (!result) { document.getElementById('radar-status').textContent = '⚠️ Radar unavailable'; return; }

  radarFrames = result.frames;
  addRadarLayersToMap(radarFrames);
  currentRadarFrame = 0;
  showRadarFrame(currentRadarFrame);
  startRadarAnimation();

  // If no nowcast yet, silently retry in background every 5 min
  // When it becomes available it gets spliced in without disrupting playback
  if (result.futureCount === 0) {
    scheduleNowcastRetry();
  }
}

// Retry nowcast silently without resetting the whole radar
let nowcastRetryTimer = null;
function scheduleNowcastRetry() {
  if (nowcastRetryTimer) clearTimeout(nowcastRetryTimer);
  nowcastRetryTimer = setTimeout(async () => {
    console.log('Retrying nowcast silently...');
    const res = await fetch(`https://api.rainviewer.com/public/weather-maps.json?_=${Date.now()}`);
    if (!res.ok) { scheduleNowcastRetry(); return; }
    const data = await res.json();
    const nowcast = (data?.radar?.nowcast || []).map(f => ({...f, type:'future'}));
    if (nowcast.length === 0) {
      // Still not available — try again in 5 min
      scheduleNowcastRetry();
      return;
    }
    // Nowcast is available — do a clean reload to include the new frames
    console.log(`Nowcast now available: ${nowcast.length} frames — reloading radar`);
    await loadRadar();
  }, 5 * 60 * 1000); // 5 minutes
}

function startRadarAnimation() {
  if (radarAnimInterval) clearInterval(radarAnimInterval);
  radarAnimInterval = setInterval(() => {
    ensureRadarLayers();
    map.setPaintProperty(`radar-layer-${currentRadarFrame}`, 'raster-opacity', 0);
    currentRadarFrame = (currentRadarFrame + 1) % radarFrames.length;
    showRadarFrame(currentRadarFrame);
  }, 700);
}

function showRadarFrame(i) {
  if (!map.getLayer(`radar-layer-${i}`)) return;
  map.setPaintProperty(`radar-layer-${i}`, 'raster-opacity', 0.65);

  const frame     = radarFrames[i];
  const t         = new Date(frame.time * 1000);
  const timeStr   = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const dateStr   = t.toLocaleDateString([],  {month:'short', day:'numeric'});
  const isFuture  = frame.type === 'future';
  const pastCount = radarFrames.filter(f => f.type === 'past').length;
  const futCount  = radarFrames.length - pastCount;

  // Progress bar — ▓ past, ░ future, ◆ current
  const bar = radarFrames.map((f,j) =>
    j === i ? '◆' : f.type === 'past' ? '▓' : '░'
  ).join('');

  const labelText = isFuture ? '🔮 Forecast' : '📡 Radar';
  const color     = isFuture ? '#818cf8'     : '#6b7fa3';

  // FIX: only show counts when future frames actually exist
  // When nowcast is unavailable just show clean past-only status — no error message
  const frameNote = futCount > 0
  ? `<span style="color:var(--text-dim);font-size:10px">${pastCount} past / ${futCount} future</span>`
  : `<span style="color:var(--text-dim);font-size:10px">${pastCount} frames</span>`;

  document.getElementById('radar-status').innerHTML =
    `<span style="color:${color}">${labelText}: ${dateStr} ${timeStr}</span>` +
    `&nbsp;&nbsp;<span style="font-family:monospace;letter-spacing:2px;color:var(--text-dim)">${bar}</span>` +
    `&nbsp;&nbsp;${frameNote}`;
}

// =====================
// REFRESH ALL
// =====================
async function refreshAll() {
  await Promise.all([loadWeather(), loadForecast(), loadHourly(), loadAlerts()]);
  if (mapReady) await loadRadar();
}

// =====================
// INIT
// =====================
async function init() {
  // Check URL params (for share link)
  const params = new URLSearchParams(location.search);
  if (params.has('lat') && params.has('lon')) {
    lat = parseFloat(params.get('lat'));
    lon = parseFloat(params.get('lon'));
  } else {
    // Try GPS silently
    const gpsOk = await new Promise(resolve => {
      if (!navigator.geolocation) { resolve(false); return; }
      navigator.geolocation.getCurrentPosition(
        pos => { lat = pos.coords.latitude; lon = pos.coords.longitude; resolve(true); },
        () => resolve(false),
        { timeout: 5000 }
      );
    });
    if (!gpsOk) document.getElementById('gps-warning').style.display = 'block';
  }

  renderFavorites();
  await Promise.all([loadWeather(), loadForecast(), loadHourly(), loadAlerts()]);
  await initMap();
  setInterval(refreshAll, 300000);
}

// Enter key for search
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('city-input').addEventListener('keydown', e => { if (e.key==='Enter') searchCity(); });
});

init();
</script>
