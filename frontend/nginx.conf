server {
    listen 80;
    charset utf-8;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location /weather {
        proxy_pass http://backend:3000;
    }

    location /forecast {
        proxy_pass http://backend:3000;
    }

    # ADD THIS — was missing, causing hourly strip to show empty
    location /hourly {
        proxy_pass http://backend:3000;
    }

    # ADD THIS — for weather alerts banner
    location /alerts {
        proxy_pass http://backend:3000;
    }
}
