server {
    listen 80;
    charset utf-8;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # FIX: /forecast was missing — backend never received forecast requests
    location /weather {
        proxy_pass http://backend:3000;
    }

    location /forecast {
        proxy_pass http://backend:3000;
    }
}
